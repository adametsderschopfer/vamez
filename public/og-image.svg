<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111111"/>

  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent top bar -->
  <rect width="1200" height="3" fill="#9fca3c"/>

  <!-- Big faded VA monogram -->
  <text x="1050" y="420" font-size="380" font-weight="900" fill="rgba(159,202,60,0.06)"
        font-family="system-ui,-apple-system,sans-serif" text-anchor="middle">VA</text>

  <!-- Name -->
  <text x="80" y="252" font-size="96" font-weight="700" fill="#ffffff"
        font-family="system-ui,-apple-system,sans-serif" letter-spacing="-3">Vladislav</text>
  <text x="80" y="356" font-size="96" font-weight="700" fill="#ffffff"
        font-family="system-ui,-apple-system,sans-serif" letter-spacing="-3">Adamets</text>

  <!-- Role -->
  <text x="82" y="426" font-size="30" font-weight="500" fill="#9fca3c"
        font-family="system-ui,-apple-system,sans-serif" letter-spacing="0.5">Senior Frontend Developer</text>

  <!-- Separator -->
  <rect x="80" y="490" width="64" height="2" fill="rgba(159,202,60,0.4)" rx="1"/>

  <!-- Skills -->
  <text x="80" y="536" font-size="22" fill="rgba(255,255,255,0.4)"
        font-family="system-ui,-apple-system,sans-serif">React · Vue · TypeScript · Next.js · Node.js</text>

  <!-- Domain -->
  <text x="80" y="594" font-size="20" fill="rgba(255,255,255,0.25)"
        font-family="system-ui,-apple-system,sans-serif">vamez.ru</text>
</svg>
