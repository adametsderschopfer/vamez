pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "**/*.{js,ts,vue}"
      run: npx eslint --fix {staged_files} && git add {staged_files}
      stage_fixed: true

    prettier:
      glob: "**/*.{js,ts,vue,css,json,md}"
      run: npx prettier --write {staged_files} && git add {staged_files}
      stage_fixed: true

    stylelint:
      glob: "**/*.{vue,css}"
      run: npx stylelint --fix {staged_files} && git add {staged_files}
      stage_fixed: true
